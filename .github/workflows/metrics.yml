name: Metrics
on:
  # Refresh once a day so the profile SVG stays current.
  schedule:
    - cron: "0 18 * * *"   # 02:00 Asia/Shanghai
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # The default GITHUB_TOKEN is enough for public-repo metrics.
          # If you ever want private-contribution counts, replace with a
          # personal-access-token secret here (e.g. ${{ secrets.METRICS_TOKEN }}).
          token: ${{ secrets.GITHUB_TOKEN }}

          # Output filename — referenced from README.md as ./github-metrics.svg.
          # The action commits this file back to the default branch.
          filename: github-metrics.svg

          # ---------- Layout ----------
          base: header, activity, community, repositories, metadata
          template: classic
          config_timezone: Asia/Shanghai

          # ---------- Plugins ----------
          plugin_languages: yes
          plugin_languages_ignored: html, css, smarty, dockerfile, batchfile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6

          plugin_lines: yes

          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons

          plugin_followup: yes
          plugin_followup_sections: repositories
