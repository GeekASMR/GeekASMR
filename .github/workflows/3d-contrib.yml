name: 3D Contrib

on:
  schedule:
    # 每天 18:30 UTC = 02:30 Asia/Shanghai 跑一次,保证 contributions 数据新鲜
    - cron: "30 18 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/3d-contrib.yml

permissions:
  contents: write

jobs:
  generate-3d-contrib:
    runs-on: ubuntu-latest
    name: generate
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          # rainbow 主题: 7 种语言 7 种颜色,夜间模式 night-rainbow
          # 我们 README 用 picture 元素自动切换 light/dark,所以两个版本都要生成
      - name: Commit & push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add profile-3d-contrib
          git diff --staged --quiet || git commit -m "chore: refresh 3d contributions"
          git push
